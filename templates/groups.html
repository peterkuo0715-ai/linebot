{% extends "base.html" %}
{% set active = 'groups' %}
{% block content %}
<div class="mb-6">
    <h1 class="text-3xl font-bold text-slate-800">群組管理</h1>
    <p class="text-slate-500 mt-1">共 {{ items|length }} 個綁定群組</p>
</div>

<div class="grid md:grid-cols-2 lg:grid-cols-3 gap-4">
    {% for item in items %}
    <div class="glass glass-hover rounded-2xl p-5">
        <div class="flex justify-between items-start">
            <div>
                <div class="text-2xl font-bold text-purple-600">{{ item.alias }}</div>
                <div class="text-sm text-slate-700 mt-1">{{ item.group_name or '未知群組' }}</div>
                <div class="text-xs text-slate-400 mt-2 font-mono truncate">{{ item.group_id }}</div>
            </div>
            {% if user.role == 'admin' %}
            <form method="post" action="/dashboard/groups/{{ item.alias }}/delete" onsubmit="return confirm('確定解綁 {{ item.alias }}？')">
                <button class="btn text-xs px-2 py-1 rounded-lg bg-red-500 text-white">解綁</button>
            </form>
            {% endif %}
        </div>
    </div>
    {% else %}
    <div class="md:col-span-2 lg:col-span-3 glass rounded-2xl p-8 text-center text-slate-500">尚未綁定任何群組</div>
    {% endfor %}
</div>
{% endblock %}
