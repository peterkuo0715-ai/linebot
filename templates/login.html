{% extends "base.html" %}
{% block content %}
<div class="min-h-[80vh] flex items-center justify-center">
    <div class="glass rounded-3xl p-8 w-full max-w-md fade-in">
        <div class="text-center mb-6">
            <div class="text-5xl mb-3">🔷</div>
            <h1 class="text-2xl font-bold bg-gradient-to-r from-purple-600 to-blue-600 bg-clip-text text-transparent">藍圈 Bot 控制台</h1>
            <p class="text-sm text-slate-500 mt-2">請使用 ERP 員工帳號登入</p>
        </div>

        {% if error %}
        <div class="mb-4 p-3 rounded-xl bg-red-50 border border-red-200 text-red-700 text-sm">
            {{ error }}
        </div>
        {% endif %}

        <form method="post" action="/dashboard/login" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1.5">ERP 帳號（姓名或 email）</label>
                <input type="text" name="username" required autofocus
                    class="w-full px-4 py-2.5 rounded-xl bg-white/70 border border-white/80 focus:outline-none focus:ring-2 focus:ring-purple-400 focus:border-transparent transition">
            </div>
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1.5">LINE Bot 驗證碼 (PIN)</label>
                <input type="password" name="pin" required
                    class="w-full px-4 py-2.5 rounded-xl bg-white/70 border border-white/80 focus:outline-none focus:ring-2 focus:ring-purple-400 focus:border-transparent transition">
            </div>
            <button type="submit"
                class="btn w-full py-2.5 rounded-xl bg-gradient-to-r from-purple-600 to-blue-600 text-white font-medium shadow-lg">
                登入
            </button>
        </form>
    </div>
</div>
{% endblock %}
